<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MojeBudky – Animovaná mapa</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0e1a0c; color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    #panel {
      background: rgba(12, 28, 10, 0.97);
      border-bottom: 2px solid #2a6018;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      z-index: 2000;
      flex-shrink: 0;
    }

    .panel-logo { height: 52px; width: auto; }

    .panel-nadpis { line-height: 1.25; }
    .panel-nadpis strong { display: block; font-size: 1.15rem; color: #c8e8a0; letter-spacing: 1px; }
    .panel-nadpis small { font-size: 0.72rem; color: #6a8a50; text-transform: uppercase; letter-spacing: 2px; }

    #rok-display {
      font-size: 2.6rem;
      font-weight: 900;
      color: #f0c040;
      background: rgba(240,192,64,0.1);
      border: 2px solid rgba(240,192,64,0.25);
      padding: 4px 22px;
      border-radius: 10px;
      min-width: 170px;
      text-align: center;
      letter-spacing: 3px;
      transition: color 0.3s, background 0.3s, transform 0.3s;
    }
    #rok-display.zmena {
      background: rgba(240,192,64,0.28);
      transform: scale(1.1);
      color: #ffe060;
    }

    #pocitadlo {
      text-align: center;
      color: #7a9a60;
      font-size: 0.88rem;
      line-height: 1.5;
    }
    #pocitadlo strong { display: block; font-size: 1.8rem; color: #c8e8a0; line-height: 1; }

    .ctrl-btn {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    #btn-play { background: #1c5c10; color: #fff; }
    #btn-play:hover { background: #2a8018; }
    #btn-play.playing { background: #7a2a06; }
    #btn-reset { background: #2a2a2a; color: #aaa; }
    #btn-reset:hover { background: #444; }

    #speed-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 0.82rem; color: #6a8a50; }
    #speed { width: 110px; accent-color: #1c5c10; }

    #map { flex: 1; }

    .budka-tooltip {
      background: rgba(255,255,255,0.93) !important;
      border: 1.5px solid #c06000 !important;
      border-radius: 5px !important;
      padding: 2px 8px !important;
      font-size: 11px !important;
      font-weight: 700 !important;
      color: #1c3a10 !important;
      white-space: nowrap !important;
      box-shadow: 0 1px 6px rgba(0,0,0,0.35) !important;
    }
    .leaflet-tooltip-top.budka-tooltip::before { border-top-color: #c06000 !important; }

    @keyframes markerPop {
      0%   { transform: scale(0) translateY(-16px); opacity: 0; }
      65%  { transform: scale(1.25) translateY(0);  opacity: 1; }
      100% { transform: scale(1)    translateY(0);  opacity: 1; }
    }
    .marker-anim { animation: markerPop 0.45s ease-out forwards; }
  </style>
</head>
<body>

<div id="panel">
  <img src="img/logo.svg" alt="MojeBudky" class="panel-logo">
  <div class="panel-nadpis">
    <strong>MojeBudky.cz</strong>
    <small>Animovaná mapa ptačích budek</small>
  </div>

  <div id="rok-display">—</div>

  <div id="pocitadlo">
    Budek na mapě<br>
    <strong id="pocet">0</strong>
    <span>/ <span id="celkem">0</span></span>
  </div>

  <button class="ctrl-btn" id="btn-play">▶ Spustit</button>
  <button class="ctrl-btn" id="btn-reset">⟳ Reset</button>

  <div id="speed-wrap">
    <label for="speed">Rychlost: <b id="speed-val">500</b> ms</label>
    <input type="range" id="speed" min="50" max="3000" value="500" step="50">
  </div>
</div>

<div id="map"></div>

// Rok dle čísla budky
function getRok(cislo) {
  if (cislo <= 32)  return '2022 / 2023';
  if (cislo <= 82)  return '2023';
  if (cislo <= 142) return '2024';
  if (cislo <= 203) return '2025';
  return '2025+';
}

// ── MAPA ──────────────────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [49.8, 15.5],
  zoom: 7,
  zoomControl: true,
  scrollWheelZoom: false
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png', {
  attribution: '© OpenStreetMap © CARTO',
  maxZoom: 19
}).addTo(map);

map.on('click', () => map.scrollWheelZoom.enable());
map.on('mouseleave', () => map.scrollWheelZoom.disable());

// Ikona budky
const budkaIcon = L.icon({
  iconUrl: 'img/logo.svg',
  iconSize: [28, 38],
  iconAnchor: [14, 38],
  popupAnchor: [0, -40]
});

// ── ANIMACE ───────────────────────────────────────────────────────────────────
let idx = 0;
let timer = null;
const markers = [];

document.getElementById('celkem').textContent = BUDKY_RAW.length;

function getSpeed() { return parseInt(document.getElementById('speed').value); }

function aktualizujRok(cislo) {
  const el = document.getElementById('rok-display');
  const novy = getRok(cislo);
  if (el.textContent !== novy) {
    el.classList.add('zmena');
    setTimeout(() => el.classList.remove('zmena'), 500);
  }
  el.textContent = novy;
}

function pridejBudku() {
  if (idx >= BUDKY_RAW.length) { zastavit(); return; }
  const [cislo, jmeno, lat, lng] = BUDKY_RAW[idx++];

  // Animovaný wrapper div-icon
  const divIcon = L.divIcon({
    className: '',
    html: `<div class="marker-anim"><img src="img/logo.svg" style="width:28px;height:38px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5))"></div>`,
    iconSize: [28, 38],
    iconAnchor: [14, 38],
    popupAnchor: [0, -42]
  });

  const marker = L.marker([lat, lng], { icon: divIcon });

  if (jmeno) {
    marker.bindTooltip(jmeno, {
      permanent: true,
      direction: 'top',
      offset: [0, -40],
      className: 'budka-tooltip'
    }).openTooltip();
    marker.bindPopup(`<strong>${jmeno}</strong><br><small>Budka č. ${cislo} · ${getRok(cislo)}</small>`);
  }

  marker.addTo(map);
  markers.push(marker);

  document.getElementById('pocet').textContent = idx;
  aktualizujRok(cislo);
}

function spustit() {
  const btn = document.getElementById('btn-play');
  btn.textContent = '⏸ Pauza';
  btn.classList.add('playing');
  timer = setInterval(pridejBudku, getSpeed());
}

function zastavit() {
  clearInterval(timer);
  timer = null;
  const btn = document.getElementById('btn-play');
  btn.classList.remove('playing');
  btn.textContent = idx >= BUDKY_RAW.length ? '✓ Hotovo' : '▶ Spustit';
}

function resetovat() {
  zastavit();
  markers.forEach(m => map.removeLayer(m));
  markers.length = 0;
  idx = 0;
  document.getElementById('pocet').textContent = '0';
  document.getElementById('rok-display').textContent = '—';
  document.getElementById('btn-play').textContent = '▶ Spustit';
}

document.getElementById('btn-play').addEventListener('click', () => {
  if (timer) zastavit(); else spustit();
});
document.getElementById('btn-reset').addEventListener('click', resetovat);
document.getElementById('speed').addEventListener('input', function () {
  document.getElementById('speed-val').textContent = this.value;
  if (timer) { zastavit(); spustit(); }
});
