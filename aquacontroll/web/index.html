<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AquaControll – přehled</title>
  <meta name="theme-color" content="#0b63b8">
  <!-- favikon = znak VHOS „pepsina" (Pepsina.png v AquaControll); SVG jako fallback -->
  <link rel="icon" href="Pepsina.png">
  <link rel="alternate icon" href="img/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- jemná tapeta piktogramů (vykreslí app.js, pokud jsou obrázky k dispozici) -->
  <div class="tapeta" id="tapeta" aria-hidden="true"></div>

  <!-- testovací provoz -->
  <div class="testbar">🔒 TESTOVACÍ PROVOZ — notifikace jsou vypnuté, žádné avízo se nikomu neodesílá.</div>

  <!-- hlavička -->
  <header class="hlavicka">
    <div class="znacka-app">
      <svg class="kapka" viewBox="0 0 64 64" aria-hidden="true">
        <defs>
          <linearGradient id="kap" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#36c5f0"/><stop offset=".55" stop-color="#1e8fe0"/><stop offset="1" stop-color="#0b63b8"/>
          </linearGradient>
        </defs>
        <path d="M32 5 C32 5 13 27 13 41 a19 19 0 1 0 38 0 C51 27 32 5 32 5 Z" fill="url(#kap)"/>
        <!-- sem přijde oficiální znak VHOS (VHOS.png); zatím náznak -->
        <circle cx="32" cy="41" r="13.5" fill="#fff"/>
        <image href="VHOS.png" x="20" y="29" width="24" height="24"
               onerror="this.remove()"/>
        <circle cx="32" cy="41" r="11" fill="none" stroke="#1379bf" stroke-width="2"/>
      </svg>
      <div class="nazev"><span class="aqua">Aqua</span><span class="controll">Controll</span></div>
    </div>
    <div class="znacka-vhos">
      <img src="VHOS.png" alt="VHOS a.s." onerror="this.style.display='none';document.getElementById('vhosText').style.display='flex'">
      <span class="vhos-text" id="vhosText"><b>VHOS</b><i>a.s.</i></span>
    </div>
  </header>

  <!-- proužek: datum/čas · online · nová událost -->
  <div class="topbar">
    <div class="datum" id="datum">—</div>
    <div class="online" id="online"></div>
    <button class="btn-nova" type="button" onclick="alert('Formulář nové události – připravujeme (PLAN.md).')">＋ Nová událost</button>
  </div>

  <main class="obsah">
    <section class="souhrn" id="souhrn"></section>

    <div class="radek-nadpis">
      <h2>Provozní střediska</h2>
      <div class="legenda" id="legenda"></div>
    </div>
    <section class="dlazdice" id="strediska"></section>

    <h2 class="nadpis-udalosti">Aktuální události <span class="pocet" id="pocet-udalosti"></span></h2>
    <section class="udalosti" id="udalosti"></section>
  </main>

  <button class="fab" type="button" title="Nová událost"
          onclick="alert('Formulář nové události – připravujeme (PLAN.md).')">＋</button>

  <footer class="paticka">
    AquaControll · interní systém VHOS a.s. · <span id="vygenerovano"></span>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
