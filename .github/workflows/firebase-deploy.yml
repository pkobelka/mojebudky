name: Deploy Firebase Database Rules

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Firebase Database Rules
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          npx firebase-tools@latest deploy --only database --project moje-budky
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
