name: Deploy Firebase Database Rules

on:
  push:
    branches:
      - main
    paths:
      - database.rules.json
      - firebase.json
      - .github/workflows/firebase-deploy.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Firebase Database Rules
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > /tmp/sa.json
          n=0
          until npx firebase-tools@latest deploy --only database --project moje-budky; do
            n=$((n+1))
            if [ $n -ge 3 ]; then echo "Selhalo po 3 pokusech"; exit 1; fi
            echo "Pokus $n selhal, zkousim znovu za 15s..."
            sleep 15
          done
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
