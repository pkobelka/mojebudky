name: Deploy na WEDOS FTP (_test)

on:
  push:
    branches:
      - main
    paths-ignore:
      - functions/**
      - '*.py'
      - PLAN.md
      - data/*.csv
      - .github/workflows/**
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vygeneruj číslo verze a vynuť čerstvou cache
        run: |
          sed -i "s/__MB_VERZE__/${GITHUB_SHA::7}/; s/__MB_CAS__/$(TZ='Europe/Prague' date '+%-d.%-m.%Y %H:%M')/; s/__MB_BUILD__/${GITHUB_SHA::7}/g" index.html

      - name: Nahraj na FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # FTP účet je u WEDOSu už nasměrovaný do _test adresáře, takže kořen účtu ("/") je _test
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            functions/**
            *.py
            PLAN.md
            data/*.csv
