name: Deploy na WEDOS FTP (produkce)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Jen nanečisto (nic se nenahraje, jen se vypíše, co by se změnilo)'
        type: boolean
        default: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vygeneruj číslo verze a vynuť čerstvou cache
        run: |
          sed -i "s/__MB_VERZE__/${{ github.run_number }}/; s/__MB_CAS__/$(TZ='Europe/Prague' date '+%-d.%-m.%Y %H:%M')/; s/__MB_BUILD__/${GITHUB_SHA::7}/g" index.html

      - name: Nahraj na produkční FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_PROD_USERNAME }}
          password: ${{ secrets.FTP_PROD_PASSWORD }}
          # Kořen tohoto účtu je hlavní (ostrý) web; _test níže je testovací verze a nesmí se jí sáhat
          server-dir: /
          dry-run: ${{ github.event.inputs.dry_run }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            functions/**
            *.py
            PLAN.md
            data/*.csv
            _test/**
