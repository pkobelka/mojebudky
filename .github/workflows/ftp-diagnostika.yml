name: Diagnostika FTP (jen čtení)

on:
  workflow_dispatch:

jobs:
  seznam:
    runs-on: ubuntu-latest
    steps:
      - name: Vypiš obsah serveru (kořen, img, img/budky)
        run: |
          echo "=== Kořen účtu (/) ==="
          curl -v --list-only "ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}/" 2>&1 | tail -60
          echo ""
          echo "=== img/ ==="
          curl -v --list-only "ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}/img/" 2>&1 | tail -60
          echo ""
          echo "=== img/budky/ ==="
          curl -v --list-only "ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}/img/budky/" 2>&1 | tail -60
